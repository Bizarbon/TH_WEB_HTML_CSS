<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ShopMini Premium</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #06b6d4;
            --accent: #f59e0b;
            --bg-dark: #020617;
            --glass: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Background Elements */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            animation: pulse 10s infinite alternate;
        }

        .glow-1 {
            top: -10%;
            left: -10%;
        }

        .glow-2 {
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes pulse {
            0% {
                transform: scale(1) translate(0, 0);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.2) translate(50px, 50px);
                opacity: 0.8;
            }
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            perspective: 1000px;
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 3.5rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% 100%;
            animation: borderFlow 4s linear infinite;
        }

        @keyframes borderFlow {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 200% 50%;
            }
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(30px) rotateX(-5deg);
            }

            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .auth-header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #fff 30%, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            color: #94a3b8;
            font-size: 1.05rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 2rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            color: #cbd5e1;
            font-size: 0.95rem;
            font-weight: 500;
            padding-left: 0.5rem;
            transition: color 0.3s;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 1.1rem 1.4rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: white;
            font-size: 1.05rem;
            font-family: inherit;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.15);
            transform: translateY(-2px);
        }

        .form-group:focus-within label {
            color: var(--primary-light);
        }

        .btn-auth {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.15rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 1rem;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-auth:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 30px -10px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        .btn-auth:active {
            transform: translateY(-1px) scale(0.98);
        }

        .auth-footer {
            text-align: center;
            margin-top: 2.5rem;
            color: #94a3b8;
            font-size: 1rem;
        }

        .auth-footer a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            padding-bottom: 2px;
        }

        .auth-footer a::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-light);
            transition: width 0.3s;
        }

        .auth-footer a:hover::after {
            width: 100%;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            margin-top: 2.5rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s;
            padding: 0.5rem 1rem;
            border-radius: 50px;
        }

        .back-home:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Toast Styling */
        .toast {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1.25rem 2rem;
            border-radius: 20px;
            color: white;
            backdrop-filter: blur(20px);
            transform: translateX(150%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10000;
            font-weight: 600;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success {
            background: rgba(16, 185, 129, 0.9);
        }

        .toast-error {
            background: rgba(239, 68, 68, 0.9);
        }

        /* Loader */
        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="auth-container reveal">
        <div style="text-align: center;">
            <h1 role="button" tabindex="0" onclick="window.location.href='index.html'"
                style="cursor:pointer; font-size: 2.2rem; font-weight: 800; margin-bottom: 2rem; background: linear-gradient(135deg, var(--primary-light), var(--secondary)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                🛒 ShopMini</h1>
        </div>
        <div class="auth-card">
            <div class="auth-header">
                <h1>Chào mừng 👋</h1>
                <p>Đăng nhập để tiếp tục khám phá</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Tài khoản</label>
                    <div class="input-wrapper">
                        <input type="text" id="identifier" placeholder="Username, Email hoặc SĐT" required
                            autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required
                            autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn-auth" id="submitBtn">
                    <span>Đăng nhập ngay</span>
                </button>
            </form>

            <div class="auth-footer">
                Chưa có tài khoản? <a href="register.html">Tạo tài khoản mới</a>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="index.html" class="back-home">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    style="width: 20px; height: 20px; margin-right: 0.6rem;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Quay lại trang chủ
            </a>
        </div>
    </div>

    <script src="js/animations.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = (type === 'success' ? '✨ ' : '❌ ') + `<span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 600);
            }, 3000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="loader"></div> <span>Đang xác thực...</span>';

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.message || 'Lỗi đăng nhập');

                showToast('Đăng nhập thành công! Đang vào trang chủ...');
                auth.saveAuth(data.token, data.user);

                setTimeout(() => {
                    window.location.href = data.user.isAdmin ? 'admin/products.html' : 'index.html';
                }, 1000);

            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>

</html>
